
<div id="erd" style="width:100%;min-height:300px"></div>
<style>
#erd svg { width: 100% !important; height: auto !important; }
#erd svg .divider path { stroke-opacity: 0.4; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#26215C' : '#EEEDFE',
    primaryBorderColor: dark ? '#534AB7' : '#CECBF6',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
    edgeLabelBackground: dark ? '#1a1a18' : '#ffffff',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  USERS ||--o{ STYLE_PROFILES : has
  USERS ||--o{ EMOTION_BRIEFS : submits
  USERS ||--o{ FEEDBACK_EVENTS : generates

  EMOTION_BRIEFS ||--o{ RECOMMENDATION_RUNS : triggers
  EMOTION_BRIEFS ||--o{ CONCEPTS : produces
  EMOTION_BRIEFS ||--o{ PHOTO_ASSETS : includes

  CONCEPTS ||--o{ BUNDLES : contains
  CONCEPTS ||--o{ FEEDBACK_EVENTS : receives

  BUNDLES ||--o{ BUNDLE_ITEMS : has
  BUNDLE_ITEMS }o--|| PRODUCT_VARIANTS : references

  PRODUCT_VARIANTS }o--|| PRODUCTS : belongs_to
  PRODUCTS }o--o{ MOOD_TAXONOMY_NODES : tagged_with

  DROPS ||--o{ CONCEPTS : groups

  USERS {
    uuid id PK
    string email
    string clerk_id
    timestamptz created_at
  }
  STYLE_PROFILES {
    uuid id PK
    uuid user_id FK
    jsonb mood_weights
    jsonb style_labels
    jsonb color_prefs
    jsonb constraint_flags
    timestamptz updated_at
  }
  EMOTION_BRIEFS {
    uuid id PK
    uuid user_id FK
    text primary_mood
    text[] secondary_moods
    text occasion
    text[] style_labels
    text color_direction
    int budget_cents
    jsonb hard_constraints
    numeric confidence
    timestamptz created_at
  }
  PHOTO_ASSETS {
    uuid id PK
    uuid brief_id FK
    text storage_key
    text scene_type
    jsonb segment_mask
    text status
    timestamptz created_at
  }
  RECOMMENDATION_RUNS {
    uuid id PK
    uuid brief_id FK
    jsonb ranking_features
    uuid[] selected_concept_ids
    int latency_ms
    timestamptz created_at
  }
  CONCEPTS {
    uuid id PK
    uuid brief_id FK
    uuid drop_id FK
    text title
    text explanation
    text primary_mood
    numeric confidence
    text status
    uuid hero_asset_id
    text created_by
    timestamptz created_at
  }
  BUNDLES {
    uuid id PK
    uuid concept_id FK
    text bundle_type
    int subtotal_cents
    boolean inventory_valid
    boolean purchasable
    timestamptz created_at
  }
  BUNDLE_ITEMS {
    uuid id PK
    uuid bundle_id FK
    uuid variant_id FK
    text role
    int quantity
    boolean is_required
    text substitution_group
    int sort_order
  }
  PRODUCTS {
    uuid id PK
    text sku
    text title
    text category
    text[] style_tags
    jsonb care_notes
    boolean outdoor_rated
    boolean allergy_flag
  }
  PRODUCT_VARIANTS {
    uuid id PK
    uuid product_id FK
    text color
    text size
    int price_cents
    int inventory_qty
    boolean available
  }
  MOOD_TAXONOMY_NODES {
    uuid id PK
    text slug
    text label
    text cluster
    text[] style_signals
    text[] constraint_keys
    numeric margin_weight
  }
  DROPS {
    uuid id PK
    text slug
    text title
    timestamptz launch_at
    timestamptz end_at
    text status
    text[] target_moods
    jsonb merchandising_rules
  }
  FEEDBACK_EVENTS {
    uuid id PK
    uuid user_id FK
    uuid concept_id FK
    text event_name
    jsonb event_value
    timestamptz created_at
  }`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0],nums[2],nums[4],nums[6]];
  const ys = [nums[1],nums[3],nums[5],nums[7]];
  const x=Math.min(...xs), y=Math.min(...ys);
  const w=Math.max(...xs)-x, h=Math.max(...ys)-y;
  const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x); rect.setAttribute('y',y);
  rect.setAttribute('width',w); rect.setAttribute('height',h);
  rect.setAttribute('rx','8');
  for(const a of ['fill','stroke','stroke-width','class','style']){
    if(firstPath.hasAttribute(a)) rect.setAttribute(a,firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p=>{
  p.setAttribute('stroke','none');
});
</script>
