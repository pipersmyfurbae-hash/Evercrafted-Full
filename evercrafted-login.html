<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign in — Evercrafted</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Italiana&display=swap" rel="stylesheet">
<style>
:root{--bg:#FDFCFA;--soft:#F6F1E8;--ink:#2B2A24;--ink2:#4A4639;--mut:#6E6755;--faint:#9b917c;--gold:#A98249;--gold-d:#8C6A38;--green:#46663E;--green-d:#3A5532;
--serif:'Italiana',Georgia,serif;--sans:'Inter',system-ui,sans-serif;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-weight:300;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}.serif{font-family:var(--serif)}
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px clamp(20px,5vw,64px);border-bottom:1px solid #ece3d2}
.logo{font-family:var(--serif);font-size:1.5rem;letter-spacing:.04em}.logo span{color:var(--gold)}
.nav a.back{font-size:13px;color:var(--mut)}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem clamp(20px,5vw,64px)}
.card{width:100%;max-width:420px;background:#fff;border:1px solid #ece3d2;border-radius:20px;padding:2.6rem 2.2rem;box-shadow:0 30px 70px rgba(90,68,32,.10);text-align:center}
.mark{font-size:1.5rem;color:var(--green)}
.card h1{font-family:var(--serif);font-weight:400;font-size:1.9rem;margin:.5rem 0 .4rem;letter-spacing:.01em}
.card p.sub{font-size:.95rem;color:var(--mut);line-height:1.6;margin-bottom:1.8rem}
label{display:block;text-align:left;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:.5rem}
input[type=email]{width:100%;padding:13px 16px;border:1px solid #e2d8c5;border-radius:12px;font-family:var(--sans);font-size:15px;color:var(--ink);background:#fdfbf7;outline:none;transition:border .18s}
input[type=email]:focus{border-color:var(--green)}
button{width:100%;margin-top:1.1rem;padding:14px;border:none;border-radius:100px;background:var(--green);color:#fff;font-family:var(--sans);font-size:14px;font-weight:600;letter-spacing:.04em;cursor:pointer;transition:background .18s}
button:hover{background:var(--green-d)}button:disabled{opacity:.6;cursor:default}
.msg{margin-top:1.2rem;font-size:.9rem;line-height:1.5;min-height:1.2rem}
.msg.ok{color:var(--green)}.msg.err{color:#a8434a}
.fine{margin-top:1.6rem;font-size:12px;color:var(--faint);line-height:1.6}
.foot{text-align:center;padding:2rem;font-size:12px;color:var(--faint)}
</style></head><body>
<nav class="nav"><a class="logo" href="/evercrafted-marketing-site.html">Ever<span>crafted</span></a><a class="back" href="/evercrafted-marketplace.html">← Back to marketplace</a></nav>
<div class="wrap">
  <div class="card">
    <div class="mark">✦</div>
    <h1>Sign in to Evercrafted</h1>
    <p class="sub">Enter your email and we'll send a magic link — no password to remember.</p>
    <form id="form">
      <label for="email">Email address</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@studio.com" required>
      <button id="btn" type="submit">Send magic link</button>
    </form>
    <div class="msg" id="msg"></div>
    <div class="fine">New here? The same link creates your account.<br>Your packs and tools live in your account once you're in.</div>
  </div>
</div>
<div class="foot">© Evercrafted · faux-botanical studio tools</div>

<script src="/assets/supabase.js"></script>
<script src="/evercrafted-auth.js"></script>
<script>
(function () {
  var form = document.getElementById('form'), btn = document.getElementById('btn'),
      email = document.getElementById('email'), msg = document.getElementById('msg');
  // If already signed in, go straight to the account page.
  if (window.ECAuth) ECAuth.user().then(function (u) { if (u) location.href = '/evercrafted-account.html'; });
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    msg.className = 'msg'; msg.textContent = '';
    var addr = (email.value || '').trim();
    if (!addr) return;
    if (!window.ECAuth) { msg.className = 'msg err'; msg.textContent = 'Auth is unavailable right now — try again shortly.'; return; }
    btn.disabled = true; btn.textContent = 'Sending…';
    ECAuth.signIn(addr).then(function (r) {
      if (r && r.error) throw r.error;
      msg.className = 'msg ok';
      msg.textContent = 'Check ' + addr + ' for your sign-in link.';
      btn.textContent = 'Link sent ✦';
    }).catch(function (err) {
      msg.className = 'msg err';
      msg.textContent = (err && err.message) || 'Could not send the link. Try again.';
      btn.disabled = false; btn.textContent = 'Send magic link';
    });
  });
})();
</script>
</body></html>
