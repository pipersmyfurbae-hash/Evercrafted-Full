<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saved Designs — Evercrafted</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F5F2ED; --surface:#FFFFFF; --ink:#1C1A17; --charcoal:#3A3530;
  --stone:#7A736A; --faint:#A89F95; --line:#E4DDD3; --sage:#6B7C5C; --sage-pale:#EEF0EB; --gold:#9A7A40;
  --serif:'Cormorant Garamond',Georgia,serif; --sans:'Jost',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);line-height:1.6;font-weight:300}
a{color:inherit;text-decoration:none}
.wrap{max-width:1100px;margin:0 auto;padding:0 1.5rem}
.top{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 0;border-bottom:1px solid var(--line)}
.logo{font-family:var(--serif);font-size:1.5rem}.logo span{color:var(--sage)}
.top a{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--stone)}
.top a:hover{color:var(--ink)}
.intro{padding:2.25rem 0 1rem}
.eyebrow{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--sage);margin-bottom:.5rem}
h1{font-family:var(--serif);font-weight:400;font-size:clamp(2rem,4vw,2.8rem);line-height:1.1}
.count{color:var(--faint);font-size:13px;margin-top:.4rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;padding:1.5rem 0 4rem}
.card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:1.25rem;display:flex;flex-direction:column;gap:.6rem}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
.card-title{font-family:var(--serif);font-size:1.4rem;line-height:1.15}
.badge{font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.b-memory{background:var(--sage-pale);color:var(--sage)}
.b-manual{background:#F0ECE3;color:var(--charcoal)}
.b-commercial{background:#F6EFE0;color:var(--gold)}
.meta{font-size:11px;color:var(--stone);letter-spacing:.03em}
.poem{font-family:var(--serif);font-style:italic;font-size:1.05rem;line-height:1.5;color:var(--charcoal);max-height:0;overflow:hidden;transition:max-height .35s ease}
.card.open .poem{max-height:600px}
.slots{display:flex;flex-wrap:wrap;gap:4px;max-height:0;overflow:hidden;transition:max-height .35s ease}
.card.open .slots{max-height:400px}
.chip{font-size:9px;letter-spacing:.03em;padding:2px 7px;border-radius:20px;background:var(--cream);border:1px solid var(--line);color:var(--charcoal)}
.prompt{font-size:11px;color:var(--stone);line-height:1.5;background:var(--cream);border:1px solid var(--line);border-radius:6px;padding:.6rem .7rem;max-height:0;overflow:hidden;padding-top:0;padding-bottom:0;transition:max-height .35s ease}
.card.open .prompt{max-height:400px;padding:.6rem .7rem}
.actions{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:.6rem;margin-top:.2rem}
.toggle{font-size:11px;letter-spacing:.05em;color:var(--sage);cursor:pointer;background:none;border:none}
.del{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);cursor:pointer;background:none;border:none}
.del:hover{color:#9A5A5A}
.muted{color:var(--faint);font-size:14px;padding:2.5rem 0}
.muted a{color:var(--sage)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">Ever<span>crafted</span></div>
    <a href="evercrafted-marketing-site.html">Site</a>
  </div>
  <div class="intro">
    <div class="eyebrow">Designs</div>
    <h1>Saved designs</h1>
    <div class="count" id="count">—</div>
  </div>
  <div class="grid" id="grid"></div>
</div>
<script>
const CONFIG = { apiBase: (location.protocol === 'file:' || ['localhost','127.0.0.1'].includes(location.hostname)) ? 'http://localhost:3001' : '' };
const DESIGN_PROMPTS = {};
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function load(){
  let items=[];
  try{ const r=await fetch(`${CONFIG.apiBase}/api/designs`); const j=await r.json(); items=j.success?(j.data||[]):[]; }catch(e){}
  document.getElementById('count').textContent = items.length + (items.length===1?' design':' designs');
  const grid=document.getElementById('grid');
  if(!items.length){ grid.innerHTML='<p class="muted">No saved designs yet. Generate one in the <a href="evercrafted-memory-scene.html">Memory Scene</a> or <a href="evercrafted-v2-engine.html">Manual Design</a> tool and hit “Save this design”.</p>'; return; }
  grid.innerHTML = items.map(d=>{
    const data=d.data||{};
    DESIGN_PROMPTS[d.id]=data.renderPrompt||'';
    const date=d.createdAt?new Date(d.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
    const slots=(data.slots||[]).map(s=>`<span class="chip">${esc(s.name)}${s.stemCount?(' ·'+s.stemCount):''}</span>`).join('');
    const poem=data.poem?`<div class="poem">“${esc(data.poem)}”</div>`:'';
    const prompt=data.renderPrompt?`<div class="prompt">${esc(data.renderPrompt)}</div>`:'';
    const image=data.imageUrl?`<img src="${esc(data.imageUrl)}" alt="" style="width:100%;border-radius:6px;border:1px solid var(--line);margin-bottom:.2rem">`:'';
    const renderBtn=(!data.imageUrl&&data.renderPrompt)?`<button class="toggle" id="rb-${d.id}" onclick="genRender('${d.id}')">Generate render</button>`:'';
    return `<div class="card" id="c-${d.id}">
      ${image}
      <div class="card-top">
        <div class="card-title">${esc(d.title)}</div>
        <span class="badge b-${d.source||'manual'}">${d.source||'manual'}</span>
      </div>
      <div class="meta">${d.formula?esc(d.formula)+' · ':''}${d.totalStems?d.totalStems+' stems · ':''}${date}</div>
      ${poem}
      ${slots?`<div class="slots">${slots}</div>`:''}
      ${prompt}
      <div class="actions">
        <div style="display:flex;gap:1rem;align-items:center">
          <button class="toggle" onclick="document.getElementById('c-${d.id}').classList.toggle('open')">View details</button>
          <a class="toggle" href="evercrafted-build-view.html?design=${d.id}" target="_blank">View build ↗</a>
          ${renderBtn}
        </div>
        <button class="del" onclick="del('${d.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}
async function genRender(id){
  const prompt=DESIGN_PROMPTS[id];
  const btn=document.getElementById('rb-'+id);
  if(!prompt){ if(btn)btn.textContent='No prompt'; return; }
  if(btn){ btn.disabled=true; btn.textContent='Rendering… (~15s)'; }
  try{
    const res=await fetch(`${CONFIG.apiBase}/api/render`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,designId:id,aspect:'portrait'})});
    const json=await res.json();
    if(!json.success) throw new Error(json.error||'render failed');
    const card=document.getElementById('c-'+id);
    if(card){ const img=document.createElement('img'); img.src=json.url; img.alt=''; img.style.cssText='width:100%;border-radius:6px;border:1px solid var(--line);margin-bottom:.2rem'; card.insertBefore(img, card.firstChild); }
    if(btn) btn.remove();
  }catch(e){ if(btn){ btn.disabled=false; btn.textContent='Render failed — retry'; } }
}
async function del(id){
  if(!confirm('Delete this saved design?')) return;
  try{ await fetch(`${CONFIG.apiBase}/api/designs/${id}`,{method:'DELETE'}); }catch(e){}
  load();
}
load();
</script>
<script src="/evercrafted-nav.js" defer></script>
</body>
</html>
