
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .shell { display: flex; min-height: 600px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
  .sidebar { width: 260px; min-width: 260px; background: var(--color-background-secondary); border-right: 0.5px solid var(--color-border-tertiary); padding: 1.25rem; display: flex; flex-direction: column; gap: 1.25rem; }
  .sidebar h2 { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.08em; }
  .mood-input { width: 100%; padding: 10px 12px; font-size: 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); outline: none; }
  .mood-input:focus { border-color: var(--color-border-primary); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 5px 11px; font-size: 12px; border-radius: 999px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
  .chip:hover, .chip.active { background: #EEEDFE; border-color: #AFA9EC; color: #3C3489; }
  .slider-row { display: flex; flex-direction: column; gap: 6px; }
  .slider-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--color-text-secondary); }
  .generate-btn { margin-top: auto; padding: 10px; font-size: 14px; font-weight: 500; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; transition: all 0.15s; }
  .generate-btn:hover { background: var(--color-background-secondary); }

  .main { flex: 1; display: flex; flex-direction: column; }
  .scene-area { flex: 1; position: relative; background: var(--color-background-primary); overflow: hidden; min-height: 340px; }
  .scene-label { position: absolute; top: 14px; left: 16px; font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-secondary); padding: 4px 10px; border-radius: 999px; border: 0.5px solid var(--color-border-tertiary); }
  .scene-svg { width: 100%; height: 100%; }

  .hotspot { cursor: pointer; }
  .hotspot circle { transition: all 0.2s; }
  .hotspot:hover circle { r: 10; }

  .product-tray { border-top: 0.5px solid var(--color-border-tertiary); padding: 1rem 1.25rem; display: flex; gap: 10px; overflow-x: auto; }
  .product-card { min-width: 130px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px; display: flex; flex-direction: column; gap: 6px; cursor: pointer; transition: border-color 0.15s; flex-shrink: 0; }
  .product-card:hover { border-color: var(--color-border-secondary); }
  .product-card.active { border-color: #7F77DD; }
  .product-icon { width: 100%; height: 60px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .product-name { font-size: 12px; font-weight: 500; color: var(--color-text-primary); }
  .product-price { font-size: 12px; color: var(--color-text-secondary); }
  .add-btn { margin-top: 2px; font-size: 11px; padding: 4px 8px; border-radius: 6px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
  .add-btn:hover { background: #EEEDFE; border-color: #AFA9EC; color: #3C3489; }

  .tooltip-box { position: absolute; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 12px; color: var(--color-text-primary); pointer-events: none; white-space: nowrap; box-shadow: none; display: none; z-index: 10; }
</style>

<div class="shell">
  <div class="sidebar">
    <div>
      <h2 style="margin-bottom: 10px;">How do you want to feel?</h2>
      <input class="mood-input" id="moodInput" placeholder="e.g. cozy autumn welcome..." value="warm fall welcome" />
    </div>
    <div>
      <h2 style="margin-bottom: 8px;">Quick moods</h2>
      <div class="chips">
        <span class="chip active" onclick="setMood(this,'warm fall welcome')">Warm autumn</span>
        <span class="chip" onclick="setMood(this,'calm minimalist entry')">Calm minimal</span>
        <span class="chip" onclick="setMood(this,'festive winter joy')">Festive winter</span>
        <span class="chip" onclick="setMood(this,'bright spring happiness')">Spring joy</span>
        <span class="chip" onclick="setMood(this,'cozy cottage morning')">Cozy cottage</span>
        <span class="chip" onclick="setMood(this,'modern garden calm')">Modern garden</span>
      </div>
    </div>
    <div>
      <h2 style="margin-bottom: 10px;">Tune the vibe</h2>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <div class="slider-row">
          <div class="slider-label"><span>Cool</span><span>Warm</span></div>
          <input type="range" min="0" max="100" value="70" id="warmth" oninput="renderScene()" style="width:100%;">
        </div>
        <div class="slider-row">
          <div class="slider-label"><span>Minimal</span><span>Lush</span></div>
          <input type="range" min="0" max="100" value="55" id="lush" oninput="renderScene()" style="width:100%;">
        </div>
        <div class="slider-row">
          <div class="slider-label"><span>Modern</span><span>Natural</span></div>
          <input type="range" min="0" max="100" value="65" id="natural" oninput="renderScene()" style="width:100%;">
        </div>
      </div>
    </div>
    <button class="generate-btn" onclick="sendPrompt('Generate a new emotional commerce entryway scene for: ' + document.getElementById(\'moodInput\').value)">Generate scene ↗</button>
  </div>

  <div class="main">
    <div class="scene-area" id="sceneArea">
      <div class="scene-label" id="sceneLabel">Warm fall welcome</div>
      <svg class="scene-svg" id="sceneSVG" viewBox="0 0 560 340" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="tooltip-box" id="tooltip"></div>
    </div>
    <div class="product-tray" id="productTray"></div>
  </div>
</div>

<script>
const scenes = {
  "warm fall welcome": {
    bg: "#F5EDE0", ground: "#C8A87A", door: "#7B4A2D", trim: "#5C3318",
    accent: "#D4863A",
    items: [
      { id: "wreath", label: "Maple Leaf Wreath", price: "$48", emoji: "🍁", x: 280, y: 145, card: "#FAEEDA" },
      { id: "mums", label: "Amber Mums Planter", price: "$34", emoji: "🌼", x: 180, y: 255, card: "#FAEEDA" },
      { id: "mums2", label: "Rust Mums Planter", price: "$34", emoji: "🌻", x: 390, y: 255, card: "#FAEEDA" },
      { id: "lantern", label: "Copper Lantern", price: "$56", emoji: "🕯️", x: 155, y: 225, card: "#FAEEDA" },
      { id: "mat", label: "Woven Jute Doormat", price: "$29", emoji: "🟫", x: 280, y: 295, card: "#FAEEDA" },
    ]
  },
  "calm minimalist entry": {
    bg: "#F0EFED", ground: "#D6D3CC", door: "#4A4A45", trim: "#333330",
    accent: "#888780",
    items: [
      { id: "wreath", label: "Olive Branch Wreath", price: "$52", emoji: "🫒", x: 280, y: 145, card: "#F1EFE8" },
      { id: "plant", label: "Linen Pot — Eucalyptus", price: "$41", emoji: "🪴", x: 195, y: 245, card: "#F1EFE8" },
      { id: "mat", label: "Stone Grey Doormat", price: "$32", emoji: "⬜", x: 280, y: 295, card: "#F1EFE8" },
      { id: "vase", label: "Ceramic Bud Vase", price: "$27", emoji: "⚬", x: 370, y: 235, card: "#F1EFE8" },
    ]
  },
  "festive winter joy": {
    bg: "#EAF0F5", ground: "#C5D8E8", door: "#1E3A5F", trim: "#122540",
    accent: "#B5171E",
    items: [
      { id: "wreath", label: "Pine & Berry Wreath", price: "$64", emoji: "🎄", x: 280, y: 145, card: "#E6F1FB" },
      { id: "lantern", label: "Frosted Glass Lantern", price: "$48", emoji: "🕯️", x: 165, y: 225, card: "#E6F1FB" },
      { id: "garland", label: "Cedar Garland", price: "$38", emoji: "🌿", x: 280, y: 98, card: "#E6F1FB" },
      { id: "mat", label: "Plaid Wool Doormat", price: "$45", emoji: "🟦", x: 280, y: 295, card: "#E6F1FB" },
      { id: "lights", label: "Warm White Lights", price: "$22", emoji: "✨", x: 390, y: 220, card: "#E6F1FB" },
    ]
  },
  "bright spring happiness": {
    bg: "#EEF5E8", ground: "#B8D89A", door: "#3B6D11", trim: "#27500A",
    accent: "#D4B83A",
    items: [
      { id: "wreath", label: "Wildflower Wreath", price: "$44", emoji: "🌸", x: 280, y: 145, card: "#EAF3DE" },
      { id: "pots", label: "Yellow Ceramic Pots", price: "$36", emoji: "🌷", x: 185, y: 250, card: "#EAF3DE" },
      { id: "pots2", label: "Lavender Planter", price: "$36", emoji: "💜", x: 380, y: 250, card: "#EAF3DE" },
      { id: "mat", label: "Striped Jute Doormat", price: "#31", emoji: "🟩", x: 280, y: 295, card: "#EAF3DE" },
    ]
  },
  "cozy cottage morning": {
    bg: "#F2EDE6", ground: "#C9B89A", door: "#6B4226", trim: "#4D2E19",
    accent: "#A0784A",
    items: [
      { id: "wreath", label: "Dried Lavender Wreath", price: "$42", emoji: "💐", x: 280, y: 145, card: "#FAEEDA" },
      { id: "basket", label: "Wicker Plant Basket", price: "$38", emoji: "🧺", x: 190, y: 248, card: "#FAEEDA" },
      { id: "bench", label: "Teak Entry Bench", price: "$129", emoji: "🪑", x: 390, y: 255, card: "#FAEEDA" },
      { id: "mat", label: "Striped Cotton Mat", price: "$33", emoji: "🟤", x: 280, y: 295, card: "#FAEEDA" },
    ]
  },
  "modern garden calm": {
    bg: "#E8F0EE", ground: "#B0C9C2", door: "#2C4A42", trim: "#1A302B",
    accent: "#4A8070",
    items: [
      { id: "wreath", label: "Geometric Moss Wreath", price: "$58", emoji: "🟢", x: 280, y: 145, card: "#E1F5EE" },
      { id: "agave", label: "Agave Planter", price: "$72", emoji: "🌵", x: 175, y: 245, card: "#E1F5EE" },
      { id: "agave2", label: "Sculptural Succulent", price: "$49", emoji: "🌱", x: 388, y: 245, card: "#E1F5EE" },
      { id: "mat", label: "Concrete-Look Mat", price: "$37", emoji: "⬛", x: 280, y: 295, card: "#E1F5EE" },
    ]
  }
};

let activeScene = "warm fall welcome";
let activeHotspot = null;

function setMood(el, mood) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('moodInput').value = mood;
  activeScene = mood;
  document.getElementById('sceneLabel').textContent = mood;
  activeHotspot = null;
  renderScene();
}

function renderScene() {
  const s = scenes[activeScene] || scenes["warm fall welcome"];
  const warmth = parseInt(document.getElementById('warmth').value) / 100;
  const lush = parseInt(document.getElementById('lush').value) / 100;

  const svg = document.getElementById('sceneSVG');

  let sky = interpolateColor(s.bg, "#E8EEF5", 1 - warmth);
  let gnd = interpolateColor(s.ground, "#B0C9C2", 1 - warmth);

  let svgContent = `
    <rect width="560" height="340" fill="${sky}"/>
    <rect x="0" y="270" width="560" height="70" fill="${gnd}"/>
    
    <rect x="210" y="80" width="140" height="200" rx="4" fill="${s.door}" />
    <rect x="210" y="80" width="140" height="200" rx="4" fill="none" stroke="${s.trim}" stroke-width="6"/>
    <rect x="216" y="86" width="60" height="90" rx="2" fill="${s.trim}" opacity="0.3"/>
    <rect x="284" y="86" width="60" height="90" rx="2" fill="${s.trim}" opacity="0.3"/>
    <rect x="216" y="184" width="128" height="90" rx="2" fill="${s.trim}" opacity="0.3"/>
    <circle cx="222" cy="234" r="5" fill="${s.accent}"/>
    
    <rect x="350" y="160" width="90" height="120" rx="0" fill="${s.trim}" opacity="0.18"/>
    <rect x="120" y="160" width="90" height="120" rx="0" fill="${s.trim}" opacity="0.18"/>
    
    <rect x="205" y="270" width="150" height="12" rx="3" fill="${s.trim}" opacity="0.25"/>
  `;

  if (lush > 0.3) {
    svgContent += `<ellipse cx="150" cy="260" rx="${18 + lush*12}" ry="${14 + lush*8}" fill="#5A8A4A" opacity="${0.5 + lush*0.3}"/>`;
    svgContent += `<ellipse cx="415" cy="260" rx="${18 + lush*12}" ry="${14 + lush*8}" fill="#5A8A4A" opacity="${0.5 + lush*0.3}"/>`;
  }

  s.items.forEach(item => {
    const isActive = activeHotspot === item.id;
    svgContent += `
      <g class="hotspot" onclick="selectHotspot('${item.id}')" style="cursor:pointer;">
        <circle cx="${item.x}" cy="${item.y}" r="12" fill="${isActive ? '#7F77DD' : '#ffffff'}" fill-opacity="${isActive ? 0.9 : 0.8}" stroke="${isActive ? '#534AB7' : '#AFA9EC'}" stroke-width="1.5"/>
        <text x="${item.x}" y="${item.y + 4}" text-anchor="middle" font-size="9" font-weight="500" fill="${isActive ? '#EEEDFE' : '#534AB7'}">+</text>
      </g>
    `;
  });

  svg.innerHTML = svgContent;

  renderProductTray(s);
}

function selectHotspot(id) {
  activeHotspot = activeHotspot === id ? null : id;
  renderScene();
  if (activeHotspot) {
    const s = scenes[activeScene];
    const item = s.items.find(i => i.id === id);
    const card = document.querySelector(`.product-card[data-id="${id}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    if (card) card.classList.add('active');
  }
}

function renderProductTray(s) {
  const tray = document.getElementById('productTray');
  tray.innerHTML = s.items.map(item => `
    <div class="product-card ${activeHotspot === item.id ? 'active' : ''}" data-id="${item.id}" onclick="selectHotspot('${item.id}')">
      <div class="product-icon" style="background:${item.card}; font-size: 24px;">${item.emoji}</div>
      <div class="product-name">${item.label}</div>
      <div class="product-price">${item.price}</div>
      <button class="add-btn" onclick="event.stopPropagation(); sendPrompt('Add ${item.label} to cart and suggest complementary items for a ${activeScene} entryway')">Add to cart ↗</button>
    </div>
  `).join('');
}

function interpolateColor(hex1, hex2, t) {
  const r1 = parseInt(hex1.slice(1,3),16), g1 = parseInt(hex1.slice(3,5),16), b1 = parseInt(hex1.slice(5,7),16);
  const r2 = parseInt(hex2.slice(1,3),16), g2 = parseInt(hex2.slice(3,5),16), b2 = parseInt(hex2.slice(5,7),16);
  const r = Math.round(r1 + (r2-r1)*t), g = Math.round(g1 + (g2-g1)*t), b = Math.round(b1 + (b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

renderScene();
</script>
