<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Scene Builder — Evercrafted</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f3ef; --sf:#fff; --s2:#f0ede8; --s3:#e8e4de;
  --bd:#ddd8d0; --bd2:#c8c2b8;
  --tx:#2a2420; --mu:#6a6058; --fa:#9a9088;
  --green:#4a6741; --gp:#eef2ed; --gd:rgba(74,103,65,.10);
  --gold:#9a7a40; --goldp:#f5efe4; --goldd:rgba(154,122,64,.10);
  --dust:#6a5a80; --dustp:#f5eef4; --dustd:rgba(106,90,128,.10);
  --r:12px; --rsm:7px; --rlg:16px;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Jost',system-ui,sans-serif;
  --tr:200ms ease;
  --sh:0 1px 4px rgba(0,0,0,.06);
  --sm:0 4px 20px rgba(0,0,0,.09);
  --sl:0 12px 48px rgba(0,0,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px;line-height:1.6}

/* NAV */
.nav{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.nav-logo{font-family:var(--serif);font-size:1.3rem;font-weight:400;color:var(--tx);text-decoration:none}
.nav-logo span{color:var(--green)}
.nav-sub{font-size:11px;color:var(--fa);font-weight:400;letter-spacing:.05em}

/* LAYOUT */
.app{max-width:1040px;margin:0 auto;padding:2rem 1.5rem 4rem}
@media(max-width:640px){.app{padding:1.25rem 1rem 3rem}}

/* PROGRESS BAR */
.progress-wrap{margin-bottom:2rem}
.progress-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--fa);margin-bottom:.5rem;display:flex;justify-content:space-between}
.progress-track{height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .5s ease}

/* INTAKE FLOW */
.intake{max-width:640px;margin:0 auto}
.step-indicator{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-bottom:2rem;flex-wrap:wrap}
.si-dot{width:8px;height:8px;border-radius:50%;background:var(--bd2);transition:all .3s ease}
.si-dot.done{background:var(--green)}
.si-dot.active{background:var(--green);transform:scale(1.4)}

.question-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rlg);padding:2rem;box-shadow:var(--sh);animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:.6rem}
.q-text{font-family:var(--serif);font-size:1.6rem;font-weight:400;color:var(--tx);line-height:1.2;margin-bottom:.4rem}
.q-sub{font-size:13px;color:var(--mu);margin-bottom:1.5rem;font-weight:300;line-height:1.5}

textarea.q-input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-family:var(--serif);font-size:1rem;font-style:italic;padding:.85rem 1rem;resize:none;min-height:100px;outline:none;transition:border-color .2s,box-shadow .2s;line-height:1.7}
textarea.q-input:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--gd)}
textarea.q-input::placeholder{color:var(--fa);font-style:italic}

input.q-input-text{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-family:var(--sans);font-size:14px;padding:.75rem 1rem;outline:none;transition:border-color .2s,box-shadow .2s}
input.q-input-text:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--gd)}
input.q-input-text::placeholder{color:var(--fa)}

.option-grid{display:grid;gap:.6rem}
.option-grid.cols-2{grid-template-columns:1fr 1fr}
.option-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:480px){.option-grid.cols-3,.option-grid.cols-2{grid-template-columns:1fr 1fr}}

.opt-btn{padding:.8rem 1rem;border-radius:var(--r);border:1.5px solid var(--bd);background:var(--s2);color:var(--mu);font-family:var(--sans);font-size:13px;font-weight:400;cursor:pointer;transition:all var(--tr);text-align:left;display:flex;align-items:center;gap:.65rem;line-height:1.3}
.opt-btn:hover{border-color:var(--green);background:var(--gp);color:var(--green)}
.opt-btn.selected{border-color:var(--green);background:var(--gp);color:var(--green);font-weight:500}
.opt-icon{font-size:18px;flex-shrink:0}
.opt-label{flex:1}
.opt-sub{font-size:11px;color:var(--fa);font-weight:300;display:block;margin-top:1px}

.q-actions{display:flex;gap:.6rem;margin-top:1.25rem;justify-content:flex-end}
.btn-next{padding:10px 24px;border-radius:100px;background:var(--green);color:#fff;font-family:var(--sans);font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all var(--tr);letter-spacing:.04em;display:inline-flex;align-items:center;gap:.5rem}
.btn-next:hover{background:#3a5030;transform:translateY(-1px)}
.btn-next:disabled{opacity:.4;cursor:default;transform:none}
.btn-back{padding:10px 18px;border-radius:100px;background:transparent;color:var(--mu);font-family:var(--sans);font-size:13px;font-weight:500;border:1px solid var(--bd);cursor:pointer;transition:all var(--tr)}
.btn-back:hover{border-color:var(--bd2);color:var(--tx)}

/* GENERATING */
.generating{text-align:center;padding:4rem 2rem;max-width:520px;margin:0 auto}
.gen-icon{font-size:2.5rem;margin-bottom:1rem;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(.95)}50%{opacity:1;transform:scale(1.05)}}
.gen-title{font-family:var(--serif);font-size:1.8rem;font-weight:400;color:var(--tx);margin-bottom:.5rem}
.gen-steps{display:flex;flex-direction:column;gap:.4rem;margin-top:1.5rem;text-align:left;max-width:320px;margin-left:auto;margin-right:auto}
.gen-step{font-size:12px;color:var(--fa);display:flex;align-items:center;gap:.6rem;transition:color .3s}
.gen-step.active{color:var(--green);font-weight:500}
.gen-step.done{color:var(--green)}
.gs-dot{width:6px;height:6px;border-radius:50%;background:var(--bd2);flex-shrink:0;transition:background .3s}
.gen-step.active .gs-dot,.gen-step.done .gs-dot{background:var(--green)}

/* SCENE OUTPUT */
.scene-output{animation:fadeUp .6s ease}
.scene-header{text-align:center;margin-bottom:2rem;padding:2.5rem 2rem;background:var(--sf);border-radius:var(--rlg);border:1px solid var(--bd);box-shadow:var(--sh)}
.scene-season-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.35rem 1rem;border-radius:100px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1rem}
.scene-title{font-family:var(--serif);font-size:2.2rem;font-weight:400;color:var(--tx);line-height:1.15;margin-bottom:.35rem}
.scene-location{font-size:13px;color:var(--mu);display:flex;align-items:center;justify-content:center;gap:.4rem}
.scene-location::before{content:'◎';color:var(--green);font-size:12px}

.output-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
@media(max-width:700px){.output-grid{grid-template-columns:1fr}}
.output-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
@media(max-width:700px){.output-grid-3{grid-template-columns:1fr}}

.out-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rlg);overflow:hidden;box-shadow:var(--sh)}
.out-card-full{grid-column:1/-1}
.oc-header{padding:.8rem 1.1rem;border-bottom:1px solid var(--bd);background:var(--s2);display:flex;align-items:center;justify-content:space-between}
.oc-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--fa)}
.oc-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px}
.oc-body{padding:1.1rem}

/* Poem */
.poem-text{font-family:var(--serif);font-size:1.05rem;font-style:italic;line-height:1.85;color:var(--charcoal,#2e2e2e)}

/* Map */
.map-container{width:100%;height:220px;border-radius:var(--rsm);overflow:hidden;background:var(--s2);position:relative}
.map-iframe{width:100%;height:100%;border:none}
.map-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.5rem;color:var(--mu)}
.map-pin{font-size:2rem}
.map-label{font-size:12px;font-weight:500}
.map-city-name{font-family:var(--serif);font-size:1.1rem;font-weight:400;color:var(--tx);margin-top:.25rem}

/* Season visual */
.season-visual{width:100%;height:160px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;overflow:hidden}
.season-particles{position:absolute;inset:0;pointer-events:none}

/* Emotion profile */
.emotion-chips{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}
.emchip{padding:.35rem .85rem;border-radius:20px;font-size:11px;font-weight:600}
.formula-row{background:var(--gp);border-radius:var(--rsm);padding:.6rem .85rem;font-size:12px;color:var(--green);font-weight:500;display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem}
.intensity-row{display:flex;gap:4px;align-items:center}
.int-pip{width:14px;height:14px;border-radius:3px;background:var(--bd);border:1px solid var(--bd2)}
.int-pip.lit{background:var(--gold);border-color:var(--gold)}

/* Render prompt */
.prompt-box{background:var(--s2);border:1px solid var(--bd);border-radius:var(--rsm);padding:1rem;font-size:12px;line-height:1.8;color:var(--mu);font-style:italic;position:relative}
.copy-btn{position:absolute;top:8px;right:8px;padding:3px 10px;border-radius:var(--rsm);border:1px solid var(--bd2);background:var(--sf);color:var(--fa);font-size:10px;cursor:pointer;font-family:var(--sans);transition:all var(--tr)}
.copy-btn:hover{color:var(--tx);border-color:var(--green)}

/* Design brief */
.brief-text{font-family:var(--serif);font-size:1rem;line-height:1.8;color:var(--tx);font-style:italic}

/* Reset btn */
.reset-wrap{text-align:center;margin-top:1.5rem}
.reset-btn{padding:10px 24px;border-radius:100px;border:1px solid var(--bd);background:transparent;color:var(--mu);font-family:var(--sans);font-size:13px;cursor:pointer;transition:all var(--tr)}
.reset-btn:hover{border-color:var(--bd2);color:var(--tx)}

/* season colours */
.spring{background:linear-gradient(135deg,#f0f7ec,#daf0e8)}
.summer{background:linear-gradient(135deg,#fef9e7,#fdebd0)}
.autumn{background:linear-gradient(135deg,#fdf2e9,#f9e4c8)}
.winter{background:linear-gradient(135deg,#eaf2fb,#d6eaf8)}
.spring-badge{background:#daf0e8;color:#2d7a4a}
.summer-badge{background:#fdebd0;color:#9a6010}
.autumn-badge{background:#f9e4c8;color:#9a5020}
.winter-badge{background:#d6eaf8;color:#2050a0}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(74,103,65,.25);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<nav class="nav">
  <a href="evercrafted-marketing-site.html" class="nav-logo">Ever<span>crafted</span></a>
  <span class="nav-sub">Memory Scene Builder</span>
</nav>

<div class="app">
  <div class="progress-wrap">
    <div class="progress-label"><span id="progress-text">Step 1 of 7</span><span id="progress-pct">14%</span></div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:14%"></div></div>
  </div>

  <!-- INTAKE -->
  <div id="intake-view" class="intake">
    <div class="step-indicator" id="step-dots"></div>
    <div id="question-wrap"></div>
  </div>

  <!-- GENERATING -->
  <div id="generating-view" style="display:none">
    <div class="generating">
      <div class="gen-icon">✦</div>
      <div class="gen-title">Building the scene</div>
      <p style="font-size:13px;color:var(--mu);font-weight:300;margin-top:.4rem">Writing the story of this memory.</p>
      <div class="gen-steps" id="gen-steps">
        <div class="gen-step" id="gs-0"><span class="gs-dot"></span>Reading the memory</div>
        <div class="gen-step" id="gs-1"><span class="gs-dot"></span>Researching the location</div>
        <div class="gen-step" id="gs-2"><span class="gs-dot"></span>Finding the right setting</div>
        <div class="gen-step" id="gs-3"><span class="gs-dot"></span>Writing the poetic scene</div>
        <div class="gen-step" id="gs-4"><span class="gs-dot"></span>Mapping the emotion profile</div>
        <div class="gen-step" id="gs-5"><span class="gs-dot"></span>Composing the design brief</div>
      </div>
    </div>
  </div>

  <!-- OUTPUT -->
  <div id="output-view" style="display:none"></div>
</div>

<script src="evercrafted-schema.js"></script>
<script>
const STEPS = [
  {
    id: 'memory', type: 'textarea',
    eyebrow: 'The memory',
    question: 'What should this wreath hold?',
    sub: 'A person, a place, a season, a feeling. Write in any way that feels natural — no wrong answers here.',
    placeholder: 'My grandmother\'s garden in late September — tall cosmos swaying, the smell of dried lavender, that warmth before the cold arrived…',
    key: 'memory'
  },
  {
    id: 'season', type: 'options', cols: 2,
    eyebrow: 'Setting the scene',
    question: 'What season does this memory live in?',
    sub: 'Not necessarily the time of year — the feeling of a season.',
    key: 'season',
    options: [
      { icon: '🌸', label: 'Spring', sub: 'New, hopeful, tender' },
      { icon: '☀️', label: 'Summer', sub: 'Full, warm, abundant' },
      { icon: '🍂', label: 'Autumn', sub: 'Golden, bittersweet, rich' },
      { icon: '❄️', label: 'Winter', sub: 'Still, quiet, interior' },
    ]
  },
  {
    id: 'location', type: 'text',
    eyebrow: 'A sense of place',
    question: 'Where does this memory take you?',
    sub: 'A city, a country, a specific place — or just a feeling of somewhere. Even "a farmhouse somewhere quiet" is enough.',
    placeholder: 'Benidorm, Spain',
    key: 'location'
  },
  {
    id: 'timeofday', type: 'options', cols: 3,
    eyebrow: 'The light',
    question: 'What time of day is it in this memory?',
    sub: 'Light changes everything.',
    key: 'timeofday',
    options: [
      { icon: '🌅', label: 'Morning', sub: 'Soft, hopeful' },
      { icon: '☀️', label: 'Midday', sub: 'Bright, full' },
      { icon: '🌇', label: 'Late afternoon', sub: 'Golden, long shadows' },
      { icon: '🌆', label: 'Evening', sub: 'Warm, winding down' },
      { icon: '🌙', label: 'Night', sub: 'Still, interior' },
      { icon: '☁️', label: 'Overcast', sub: 'Soft, melancholy' },
    ]
  },
  {
    id: 'who', type: 'options', cols: 2,
    eyebrow: 'Who was there',
    question: 'Who is in this memory?',
    sub: 'Or is it more of a feeling than a person?',
    key: 'who',
    options: [
      { icon: '🧍', label: 'Just me', sub: 'Solitary, reflective' },
      { icon: '👩', label: 'Someone specific', sub: 'A person I am honouring' },
      { icon: '👨‍👩‍👧', label: 'A group', sub: 'Family, gathering, celebration' },
      { icon: '💭', label: 'A feeling, not a person', sub: 'A time, a place, a state of mind' },
    ]
  },
  {
    id: 'sensory', type: 'text',
    eyebrow: 'The detail that stays',
    question: 'One sensory detail — something you can almost smell, hear, or feel.',
    sub: 'The specific thing that makes this memory yours. "The smell of dried lavender." "The sound of a screen door." "The weight of a wool blanket."',
    placeholder: 'The smell of dried lavender on the warm stone path',
    key: 'sensory'
  },
  {
    id: 'feeling', type: 'options', cols: 3,
    eyebrow: 'What it left behind',
    question: 'What did this leave you with?',
    sub: 'The feeling underneath the memory.',
    key: 'feeling',
    options: [
      { icon: '☮️', label: 'Peace', sub: 'Quiet, settled' },
      { icon: '💛', label: 'Warmth', sub: 'Safe, held' },
      { icon: '🌊', label: 'Longing', sub: 'Missing, reaching back' },
      { icon: '🖤', label: 'Grief', sub: 'Loss, tenderness' },
      { icon: '✨', label: 'Joy', sub: 'Bright, alive' },
      { icon: '🌀', label: 'Something complicated', sub: 'More than one thing at once' },
    ]
  },
];

let currentStep = 0;
let answers = {};
let selectedOption = null;

function renderDots() {
  const el = document.getElementById('step-dots');
  el.innerHTML = STEPS.map((_, i) => {
    const cls = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
    return `<div class="si-dot ${cls}"></div>`;
  }).join('');
}

function updateProgress() {
  const pct = Math.round(((currentStep + 1) / STEPS.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `Step ${currentStep + 1} of ${STEPS.length}`;
  document.getElementById('progress-pct').textContent = pct + '%';
}

function renderStep() {
  const step = STEPS[currentStep];
  selectedOption = answers[step.key] || null;
  renderDots();
  updateProgress();

  const backBtn = currentStep > 0
    ? `<button class="btn-back" onclick="goBack()">← Back</button>` : '';

  let inputHtml = '';
  if (step.type === 'textarea') {
    const val = answers[step.key] || '';
    inputHtml = `<textarea class="q-input" id="q-input" placeholder="${step.placeholder}" rows="4" oninput="checkTextInput()">${val}</textarea>`;
  } else if (step.type === 'text') {
    const val = answers[step.key] || '';
    inputHtml = `<input class="q-input-text" id="q-input" type="text" placeholder="${step.placeholder}" value="${val}" oninput="checkTextInput()">`;
  } else if (step.type === 'options') {
    const cols = step.cols || 2;
    inputHtml = `<div class="option-grid cols-${cols}">${step.options.map(opt => {
      const sel = answers[step.key] === opt.label ? 'selected' : '';
      return `<button class="opt-btn ${sel}" onclick="selectOption('${opt.label}', this)">
        <span class="opt-icon">${opt.icon}</span>
        <span class="opt-label">${opt.label}<span class="opt-sub">${opt.sub}</span></span>
      </button>`;
    }).join('')}</div>`;
  }

  const isLast = currentStep === STEPS.length - 1;
  const nextLabel = isLast ? 'Create the scene →' : 'Continue →';
  const nextDisabled = step.type === 'options' && !answers[step.key] ? 'disabled' : '';

  document.getElementById('question-wrap').innerHTML = `
    <div class="question-card">
      <div class="q-eyebrow">${step.eyebrow}</div>
      <div class="q-text">${step.question}</div>
      <div class="q-sub">${step.sub}</div>
      ${inputHtml}
      <div class="q-actions">
        ${backBtn}
        <button class="btn-next" id="next-btn" onclick="goNext()" ${nextDisabled}>${nextLabel}</button>
      </div>
    </div>`;

  // Auto-focus
  const inp = document.getElementById('q-input');
  if (inp) setTimeout(() => inp.focus(), 100);
}

function checkTextInput() {
  const inp = document.getElementById('q-input');
  const btn = document.getElementById('next-btn');
  if (btn) btn.disabled = !inp?.value?.trim();
}

function selectOption(label, btn) {
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  answers[STEPS[currentStep].key] = label;
  document.getElementById('next-btn').disabled = false;
  // Auto-advance for options
  setTimeout(() => goNext(), 320);
}

function goNext() {
  const step = STEPS[currentStep];
  if (step.type !== 'options') {
    const inp = document.getElementById('q-input');
    const val = inp?.value?.trim();
    if (!val && step.id !== 'location') return;
    answers[step.key] = val || '';
  }
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    renderStep();
  } else {
    startGeneration();
  }
}

function goBack() {
  if (currentStep > 0) { currentStep--; renderStep(); }
}

// ── GENERATION ──
async function startGeneration() {
  document.getElementById('intake-view').style.display = 'none';
  document.getElementById('generating-view').style.display = 'block';

  const steps = ['gs-0','gs-1','gs-2','gs-3','gs-4','gs-5'];
  let si = 0;
  const interval = setInterval(() => {
    if (si > 0) { const prev = document.getElementById(steps[si-1]); if(prev) prev.classList.add('done'); }
    if (si < steps.length) { const cur = document.getElementById(steps[si]); if(cur) cur.classList.add('active'); }
    si++;
    if (si > steps.length) clearInterval(interval);
  }, 1100);

  try {
    const locationData = await researchLocation(answers.location);
    const result = await callClaudeScene(answers, locationData);
    clearInterval(interval);
    steps.forEach(s => { const el = document.getElementById(s); if(el){ el.classList.add('done'); el.classList.remove('active'); }});
    result._locationData = locationData;
    setTimeout(() => showOutput(result), 600);
  } catch(e) {
    clearInterval(interval);
    console.error(e);
    document.getElementById('generating-view').innerHTML = `
      <div class="generating">
        <div style="font-size:2rem;margin-bottom:1rem">\u2726</div>
        <div style="font-size:14px;color:var(--mu)">Something went wrong \u2014 please try again.</div>

// ── CALL 1: Location researcher → server ─────────────────
async function researchLocation(location) {
  if (!location || !location.trim()) {
    return {
      city: 'Columbus', country: 'Ohio, USA',
      known_for: ['Midwest warmth', 'seasonal colour', 'tree-lined neighbourhoods'],
      architecture: 'brick homes, front porches, neighbourhood gardens',
      landscape: 'rolling Ohio countryside, deciduous trees',
      lifestyle: 'unhurried, domestic, community-centred',
      light_quality: 'soft Midwest light, golden in autumn',
      iconic_surfaces: ['front porch railing', 'brick garden wall', 'painted screen door', 'sunlit kitchen window'],
      nearby_notable: 'Scioto River, Schiller Park',
      palette_suggestion: 'warm ambers, sage greens, dusty terracotta',
      lifestyle_setting_ideas: ['front porch with rocking chairs', 'brick garden wall', 'sunlit kitchen window with herbs'],
    };
  }
  try {
    const res = await fetch(`${CONFIG.apiBase}/api/location`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ location }),
    });
    if (!res.ok) throw new Error(`Location server ${res.status}`);
    const json = await res.json();
    if (!json.success) {
      console.warn('Location route returned success:false —', json.error);
      return json.fallback || buildLocationFallback(location);
    }
    console.log('Location research ok:', json.data?.city, json.data?.known_for);
    return json.data;
  } catch(err) {
    console.warn('Location fetch error:', err.message);
    return buildLocationFallback(location);
  }
}

function buildLocationFallback(location) {
  return {
    city: location, country: '',
    known_for: [location + ' landscape', location + ' architecture', 'local culture'],
    architecture: 'local architectural character',
    landscape: 'natural landscape of ' + location,
    lifestyle: 'local pace and culture',
    light_quality: 'natural light',
    iconic_surfaces: ['local wall', 'architectural feature', 'natural setting', 'regional facade'],
    nearby_notable: location,
    palette_suggestion: 'natural regional tones',
    lifestyle_setting_ideas: [
      'against a characteristic local wall',
      'at a local waterfront or garden setting',
      'in a lifestyle interior typical of the region',
    ],
  };
}

// ── CALL 2: Scene generator → server ─────────────────────
async function callClaudeScene(a, loc) {
  try {
    const res = await fetch(`${CONFIG.apiBase}/api/scene`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...a, locationData: loc }),
    });
    if (!res.ok) throw new Error(`Scene server ${res.status}`);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Scene generation failed');
    console.log('Scene ok — formula:', json.data?.formula, '| poem_emotions:', json.data?.poem_emotions);
    return json.data;
  } catch(err) {
    console.error('Scene fetch error:', err.message);
    throw err;
  }
}

const ROLE_RADII = {structural:[0.55,0.75],focal:[0.60,0.72],secondary:[0.44,0.58],bridge:[0.32,0.52],greenery:[0.66,0.90],accent:[0.58,0.82],texture:[0.40,0.64]};

function buildPolarSVG(filledSlots, formula) {
  const cx = 160, cy = 160, mR = 120;
  const ad = FORMULA_ARCS[formula] || { s: 210, e: 330 };
  const arcSpan = ((ad.e - ad.s) + 360) % 360 || 360;

  const ns = 'http://www.w3.org/2000/svg';
  const mk = (tag, attrs) => {
    const el = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  };
  const toRad = d => (d - 90) * Math.PI / 180;
  const arcPath = (sd, ed, r) => {
    const span = ((ed - sd) + 360) % 360;
    if (span >= 359) return `M ${cx} ${cy-r} A ${r} ${r} 0 1 1 ${cx-.01} ${cy-r}`;
    const lg = span > 180 ? 1 : 0;
    const sx = cx + r * Math.cos(toRad(sd)); const sy = cy + r * Math.sin(toRad(sd));
    const ex = cx + r * Math.cos(toRad(ed)); const ey = cy + r * Math.sin(toRad(ed));
    return `M ${cx} ${cy} L ${sx.toFixed(1)} ${sy.toFixed(1)} A ${r} ${r} 0 ${lg} 1 ${ex.toFixed(1)} ${ey.toFixed(1)} Z`;
  };

  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', `0 0 320 320`);
  svg.setAttribute('style', 'width:100%;max-width:300px;display:block;margin:0 auto');

  // Rings
  for (let i = 1; i <= 4; i++) svg.appendChild(mk('circle', {cx, cy, r: mR*i/4, fill:'none', stroke:'#ddd8d0', 'stroke-width':'0.5'}));

  // Silence zone
  svg.appendChild(mk('path', {d: arcPath(ad.e%360, ad.s, mR), fill:'rgba(240,237,232,0.7)', stroke:'none'}));

  // Active arc
  svg.appendChild(mk('path', {d: arcPath(ad.s, ad.e, mR), fill:'rgba(74,103,65,0.05)', stroke:'#4a6741', 'stroke-width':'0.5', 'stroke-dasharray':'3 3'}));

  // Place each floral — coordinates from the SINGLE SOURCE OF TRUTH (placeSlots),
  // the exact same geometry the layered build view uses. Blueprint and build can
  // never disagree because there is only one placement brain now.
  const placed = EC_SCHEMA.placeSlots(filledSlots, formula, { wreathDiam: 22 });
  const legendItems = [];

  placed.units.forEach(p => {
    const px = cx + p.x * mR;
    const py = cy + p.y * mR;
    const dr = p.role === 'focal' ? 9 : p.role === 'structural' ? 8 : p.role === 'secondary' ? 6.5 : p.role === 'greenery' ? 5.5 : 5;
    const zc = ZONE_COLORS[p.role] || '#888';
    const fill = p.colorHex || '#c9b7a8';
    const g = mk('g', {});
    g.appendChild(mk('circle', {cx: px.toFixed(1), cy: py.toFixed(1), r: (dr + 2).toFixed(1), fill: zc, opacity:'0.20'}));
    g.appendChild(mk('circle', {cx: px.toFixed(1), cy: py.toFixed(1), r: dr.toFixed(1), fill, stroke: zc, 'stroke-width':'1.2'}));
    svg.appendChild(g);
  });

  // one legend entry per chosen floral (not per placed unit); works for curated
  // recipe slots (top-level name/colorHex) and inventory-filled slots (.item)
  filledSlots.filter(s => s && (s.item || s.role)).forEach(slot => {
    legendItems.push({
      name: (slot.item && slot.item.name) || slot.name || '',
      color: (slot.item && (slot.item.color || slot.item.colorHex)) || slot.colorHex || '#c9b7a8',
      border: ZONE_COLORS[slot.role] || '#888', role: slot.role, stems: slot.stemCount });
  });

  // Center
  svg.appendChild(mk('circle', {cx, cy, r: 9, fill:'#f5f3ef', stroke:'#ddd8d0', 'stroke-width':'0.5'}));

  // Arc label
  const txt = mk('text', {x: cx, y: mR * 2 + 12, 'text-anchor':'middle', 'font-family':'Jost,sans-serif', 'font-size':'9', fill:'#9a9088', 'letter-spacing':'.06em'});
  txt.textContent = `${formula.toUpperCase()} · active arc ${ad.s}°–${ad.e > 360 ? ad.e - 360 : ad.e}°`;
  svg.appendChild(txt);

  return { svg, legendItems };
}

          <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fa);margin-bottom:.6rem">Selected florals</div>
          <div id="slot-fill-list"></div>
          <div style="margin-top:.75rem;padding:.6rem .75rem;background:var(--s2);border-radius:var(--rsm);border:1px solid var(--bd);font-size:11px;color:var(--mu)">
            <span style="font-weight:600;color:var(--tx)">Total stems:</span> <span id="total-stems" style="color:var(--green);font-weight:600">—</span> &nbsp;·&nbsp; 22" grapevine base
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ROW 4: render prompt -->
  <div class="out-card out-card-full">
    <div class="oc-header">
      <span class="oc-title">Location-aware render prompt</span>
      <span class="oc-badge" style="background:var(--goldp);color:var(--gold)">Midjourney · Flux</span>
    </div>
    <div class="oc-body">
      ${r.render_surface ? `<div style="font-size:12px;color:var(--green);font-weight:500;margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem"><span style="font-size:11px">◎</span>${r.render_surface}</div>` : ''}
      <div class="prompt-box">
        <button class="copy-btn" onclick="copyPrompt()">Copy</button>
        <span id="prompt-text">${r.render_prompt}</span>
      </div>
      <div style="margin-top:.6rem;font-size:11px;color:var(--fa);line-height:1.6">
        This prompt places your wreath in the actual world of this memory — not a generic studio shot. The surface, the setting, the light, and the atmosphere all trace back to what was shared. Every render is unrepeatable.
      </div>
    </div>
  </div>

  <div class="reset-wrap">
    <button class="reset-btn" onclick="resetAll()">← Start a new memory</button>
  </div>

</div>`;

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-text').textContent = 'Scene complete';
  document.getElementById('progress-pct').textContent = '100%';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // ── Run blueprint engine ──
  setTimeout(() => renderBlueprint(r), 80);

  } catch(renderErr) {
    console.error('showOutput render error:', renderErr);
    document.getElementById('output-view').innerHTML = `
      <div style="padding:2rem;color:var(--er);font-size:13px;line-height:1.7;background:var(--sf);border-radius:var(--rlg);border:1px solid var(--bd)">
        <strong>Render error:</strong> ${renderErr.message}<br>
        <small style="color:var(--fa)">Check the browser console for details. The scene data was received — this is a display issue only.</small>
        <br><br>
        <details><summary style="cursor:pointer;color:var(--mu)">Raw scene data</summary>
        <pre style="font-size:9px;margin-top:.5rem;overflow:auto;max-height:300px;color:var(--fa)">${JSON.stringify(r, null, 2)}</pre>
        </details>
      </div>`;
  }
}

function renderBlueprint(r) {
  const emotions = (r.emotions || []).map(e => e.toLowerCase());
  const intensity = r.intensity || 1;
  const poemEmotions = r.poem_emotions || {};
  // Formula: prefer the AI's choice, but if it's missing or non-canonical, let the
  // emotion bridge supply one rather than silently defaulting to Crescent.
  const formula = (r.formula && EC_SCHEMA.FORMULA_ARCS[r.formula])
    ? r.formula
    : EC_SCHEMA.suggestFormula(emotions);

  // Show poem emotion hierarchy if present
  if (poemEmotions.structural || poemEmotions.secondary || poemEmotions.undertone) {
    const peWrap = document.getElementById('poem-emotions-wrap');
    if (peWrap) {
      const layers = [
        { key: 'structural', label: 'Foundation layer', sub: 'anchors the design — deepest in the arc', color: 'var(--green)', bg: 'var(--gp)' },
        { key: 'secondary',  label: 'Character layer',  sub: 'fills around it — gives the design its voice', color: 'var(--dust)', bg: 'var(--dustp)' },
        { key: 'undertone',  label: 'Undertone layer',  sub: 'the quiet one — discovered at the edge', color: 'var(--gold)', bg: 'var(--goldp)' },
      ];
      peWrap.innerHTML = layers.map(l => poemEmotions[l.key] ? `
        <div style="display:flex;align-items:flex-start;gap:.6rem;padding:.5rem .65rem;border-radius:var(--rsm);background:${l.bg};border:1px solid ${l.color}22;margin-bottom:.4rem">
          <span style="font-size:8px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:${l.color};margin-top:2px;width:68px;flex-shrink:0">${l.label}</span>
          <div>
            <span style="font-size:12px;font-weight:600;color:var(--tx)">${poemEmotions[l.key]}</span>
            <span style="font-size:10px;color:var(--mu);margin-left:.4rem">${l.sub}</span>
          </div>
        </div>`:'').join('');
    }
  }

  // CURATE-FIRST: the design brain (server /api/scene) returns ideal_slots — the
  // dream design's named florals in their TRUE colours, honouring any stated
  // materials. That is what we place and draw. If absent (older response), fall
  // back to designing from the maker's tagged inventory.
  const idealSlots = Array.isArray(r.ideal_slots) && r.ideal_slots.length >= 4
    ? r.ideal_slots
    : (Array.isArray(r.ideal_recipe) ? EC_SCHEMA.recipeToSlots(r.ideal_recipe) : []);
  const curated = idealSlots.length >= 4;
  const filledSlots = curated ? idealSlots : runSlotFill(emotions, formula, intensity, poemEmotions);
  // display accessors that work for BOTH curated slots and inventory-filled slots
  const sName  = s => (s.item && s.item.name) || s.name || '';
  const sColor = s => (s.item && (s.item.color || s.item.colorHex)) || s.colorHex || '#c9b7a8';
  const sEp    = s => (s.item && (s.item.blend || s.item.ep)) || s.ep || '';
  const sHas   = s => !!(s && (s.item || s.role));

  // Palette + design-DNA panel (curated path)
  renderDesignDNA(r, curated);

  // Build polar SVG
  const { svg, legendItems } = buildPolarSVG(filledSlots, formula);
  const canvasWrap = document.getElementById('polar-canvas-wrap');
  if (canvasWrap) { canvasWrap.innerHTML = ''; canvasWrap.appendChild(svg); }  // clear before re-render

  // Polar legend
  const legEl = document.getElementById('polar-legend');
  if (legEl) {
    legEl.innerHTML = legendItems.map(l =>
      `<span style="display:inline-flex;align-items:center;gap:3px;font-size:9px;color:var(--fa)">
        <span style="width:7px;height:7px;border-radius:50%;background:${l.color};border:1.5px solid ${l.border};display:inline-block;flex-shrink:0"></span>
        ${l.name}
      </span>`
    ).join('');
  }

  // Slot fill list
  const listEl = document.getElementById('slot-fill-list');
  if (listEl) {
    const tiers = [...new Set(filledSlots.map(s => s.tier))];
    let html = '';
    for (const tier of tiers) {
      const ts = filledSlots.filter(s => s.tier === tier && sHas(s));
      if (!ts.length) continue;
      html += `<div style="margin-bottom:.65rem">
        <div style="font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--fa);margin-bottom:.3rem">${tier}</div>`;
      ts.forEach(slot => {
        const zc = ZONE_COLORS[slot.role] || '#888';
        html += `<div style="display:flex;align-items:center;gap:.6rem;padding:.4rem .5rem;border-radius:var(--rsm);background:var(--s2);border:1px solid var(--bd);margin-bottom:.3rem">
          <span style="width:8px;height:8px;border-radius:50%;background:${sColor(slot)};border:1.5px solid ${zc};flex-shrink:0"></span>
          <span style="flex:1;font-size:11px;font-weight:500;color:var(--tx)">${sName(slot)}</span>
          <span style="font-size:9px;padding:1px 6px;border-radius:20px;background:${zc}18;color:${zc};border:1px solid ${zc}30;font-weight:600">${slot.role}</span>
          <span style="font-size:9px;color:var(--fa)">${sEp(slot)}</span>
          <span style="font-size:11px;font-weight:600;color:var(--green);min-width:22px;text-align:right">${slot.stemCount}</span>
        </div>`;
      });
      html += '</div>';
    }
    listEl.innerHTML = html;
  }

  // Total stems
  const total = filledSlots.filter(sHas).reduce((a, b) => a + (b.stemCount || 0), 0);
  const totEl = document.getElementById('total-stems');
  if (totEl) totEl.textContent = total;

  // Offer to save this design
  buildSaveBar({
    title: r.scene_title || 'Untitled scene',
    source: 'memory',
    formula,
    totalStems: total,
    data: {
      poem: r.poem || '', brief: r.brief || '',
      emotions, poemEmotions,
      renderPrompt: document.getElementById('prompt-text')?.textContent || r.render_prompt || '',
      renderSurface: r.render_surface || '',
      location: r.map_query || (typeof answers !== 'undefined' ? (answers.location || '') : ''),
      slots: filledSlots.filter(sHas).map(s => ({ role: s.role, tier: s.tier, name: sName(s), stemCount: s.stemCount, floralUnits: s.floralUnits, bloomSize: s.bloomSize, ep: sEp(s), colorHex: sColor(s), behavior: s.behavior || (s.item && s.item.behavior) || 'mid', movement: s.movement || (s.item && s.item.movement) || 'still', palette: s.palette || (s.item && s.item.palette) || 'neutral-mid', assetUrl: (s.item && s.item.assetUrl) || '' })),
    },
  });

  // Reconcile the dream design against the maker's inventory: have vs. source
  if (curated) renderSourcing(filledSlots);
  else renderGapSuggestions(filledSlots, formula, emotions, poemEmotions);
}

// ── Save design ───────────────────────────────────────────────────────────────
function buildSaveBar(design) {
  let bar = document.getElementById('save-design-bar');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'save-design-bar';
    bar.style.cssText = 'max-width:1100px;margin:1.25rem auto 0;padding:0 1.25rem;display:flex;align-items:center;gap:.75rem';
    const out = document.getElementById('output-view');
    if (out) out.insertBefore(bar, out.firstChild);
  }
  bar.innerHTML = `<button id="save-design-btn" style="padding:10px 22px;border-radius:100px;border:none;background:var(--green,#4A6741);color:#fff;font-family:var(--sans,system-ui,sans-serif);font-size:12px;font-weight:600;letter-spacing:.06em;cursor:pointer">Save this design</button>
    <button id="gen-render-btn" style="padding:10px 22px;border-radius:100px;border:1px solid var(--green,#4A6741);background:transparent;color:var(--green,#4A6741);font-family:var(--sans,system-ui,sans-serif);font-size:12px;font-weight:600;letter-spacing:.06em;cursor:pointer">Generate render</button>
    <button id="build-view-btn" style="padding:10px 22px;border-radius:100px;border:1px solid var(--green,#4A6741);background:transparent;color:var(--green,#4A6741);font-family:var(--sans,system-ui,sans-serif);font-size:12px;font-weight:600;letter-spacing:.06em;cursor:pointer">Build view</button>
    <span id="save-design-msg" style="font-size:12px;color:var(--mu,#888)"></span>`;
  document.getElementById('save-design-btn').onclick = () => saveDesign(design);
  document.getElementById('gen-render-btn').onclick = () => generateRender(design);
  document.getElementById('build-view-btn').onclick = () => openBuildView(design);
}
function openBuildView(design) {
  try { localStorage.setItem('ec_build', JSON.stringify({ title: design.title, formula: design.formula, totalStems: design.totalStems, slots: design.data.slots })); } catch (e) {}
  window.open('evercrafted-build-view.html', '_blank');
}
async function generateRender(design) {
  const msg = document.getElementById('save-design-msg');
  const btn = document.getElementById('gen-render-btn');
  const prompt = design && design.data && design.data.renderPrompt;
  if (!prompt) { if (msg) msg.textContent = 'No render prompt to generate from.'; return; }
  if (btn) { btn.disabled = true; btn.textContent = 'Rendering…'; }
  if (msg) msg.textContent = 'Generating the image — this can take ~10–20s…';
  try {
    const res = await fetch(`${CONFIG.apiBase}/api/render`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt, aspect: 'portrait' }) });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'render failed');
    design.data.imageUrl = json.url; // included if the design is saved afterwards
    let wrap = document.getElementById('render-image-wrap');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'render-image-wrap';
      wrap.style.cssText = 'max-width:1100px;margin:1rem auto 0;padding:0 1.25rem';
      const bar = document.getElementById('save-design-bar');
      if (bar && bar.parentNode) bar.parentNode.insertBefore(wrap, bar.nextSibling);
      else document.getElementById('output-view')?.appendChild(wrap);
    }
    wrap.innerHTML = `<img src="${json.url}" alt="Rendered wreath" style="max-width:440px;width:100%;border-radius:12px;border:1px solid var(--bd,#e4ddd3)">`;
    if (msg) msg.textContent = '✓ Render ready — save the design to keep it.';
    if (btn) { btn.disabled = false; btn.textContent = 'Regenerate'; }
  } catch (e) {
    if (msg) msg.textContent = 'Render failed: ' + e.message;
    if (btn) { btn.disabled = false; btn.textContent = 'Generate render'; }
  }
}
async function saveDesign(design) {
  const btn = document.getElementById('save-design-btn');
  const msg = document.getElementById('save-design-msg');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    const res = await fetch(`${CONFIG.apiBase}/api/designs`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(design) });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'save failed');
    if (msg) msg.textContent = '✓ Saved to your designs.';
    if (btn) btn.textContent = 'Saved ✓';
  } catch (e) {
    if (msg) msg.textContent = 'Could not save: ' + e.message;
    if (btn) { btn.disabled = false; btn.textContent = 'Save this design'; }
  }
}

// Load the maker's saved inventory; if they have any, the blueprint designs from it
async function loadUserInventory() {
  try {
    const res = await fetch(`${CONFIG.apiBase}/api/inventory`);
    const json = await res.json();
    const items = (json && json.success) ? (json.data || []) : [];
    if (items.length) {
      ACTIVE_INVENTORY = items.map(i => ({
        id: i.id, name: i.name, color: i.colorHex || '#cccccc',
        role: i.role, pass: i.pass, ep: i.ep, es: i.es || '', blend: '',
        behavior: i.behavior, movement: i.movement, finish: i.finish,
        palette: i.palette, contrast: 'unified',
        intensity: Array.isArray(i.intensity) ? i.intensity : [1, 2],
        yield: i.yield, bloomSize: i.bloomSize, stemLength: i.stemLength, unit: i.unit, assetUrl: i.assetUrl || '',
      }));
      console.log(`Designing from your inventory: ${ACTIVE_INVENTORY.length} pieces`);
    }
  } catch (e) { /* keep demo inventory */ }
}

// For any slot the inventory can't fill, suggest shop pieces that fit the composition
// ── Design DNA panel: 60-30-10 palette, archetypes, spec block, honoured materials ──
function renderDesignDNA(r, curated) {
  let wrap = document.getElementById('design-dna');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'design-dna';
    wrap.style.cssText = 'max-width:1100px;margin:1.25rem auto 0;padding:0 1.25rem';
    const out = document.getElementById('output-view');
    if (out) out.appendChild(wrap);
  }
  wrap.innerHTML = '';
  if (!curated) return;
  const pal = r.color_palette || {};
  const nb = r.normalized_brief || {};
  const sw = c => (c && c.hex) ? `<span style="display:inline-flex;align-items:center;gap:.4rem">
      <span style="width:16px;height:16px;border-radius:50%;background:${c.hex};border:1px solid #0002;flex-shrink:0"></span>
      <span style="font-size:11px;color:var(--tx)">${c.name || ''}</span></span>` : '';
  const mats = (nb.material_preferences || []).filter(Boolean);
  const ambs = (nb.ambiguities || []).filter(Boolean);
  let html = `<div style="border-top:1px solid var(--bd);padding-top:1.25rem">
    <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fa);margin-bottom:.25rem">Design DNA</div>
    <div style="font-family:var(--serif,'Cormorant Garamond',serif);font-size:1.35rem;margin-bottom:.9rem;color:var(--tx)">${r.atmosphere_archetype || ''}${r.movement_archetype ? ' · ' + r.movement_archetype : ''}</div>`;
  if (pal.dominant || pal.supporting || pal.accent) {
    html += `<div style="display:flex;flex-wrap:wrap;gap:1.1rem;align-items:center;margin-bottom:.9rem">
      ${sw(pal.dominant)}${sw(pal.supporting)}${sw(pal.accent)}
      ${pal.warm_cool_lean ? `<span style="font-size:10px;color:var(--mu)">${pal.warm_cool_lean} · ${pal.contrast_level || ''} contrast · ${pal.seasonal_fit || ''}</span>` : ''}
    </div>`;
  }
  if (mats.length) {
    html += `<div style="font-size:11px;color:var(--mu);margin-bottom:.6rem">Honouring your materials: ${mats.map(m => `<span style="background:var(--gp);color:var(--green);padding:1px 8px;border-radius:20px;font-weight:600">${m}</span>`).join(' ')}</div>`;
  }
  if (r.spec_block) {
    html += `<pre style="font-family:var(--sans,system-ui);font-size:11px;line-height:1.7;color:var(--tx);white-space:pre-wrap;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rsm);padding:.85rem 1rem;margin:0 0 .6rem">${r.spec_block.replace(/</g,'&lt;')}</pre>`;
  }
  if (ambs.length) {
    html += `<div style="font-size:10px;color:var(--gold,#9a7b3a);line-height:1.5">${ambs.map(a => '⚑ ' + a).join('<br>')}</div>`;
  }
  html += `</div>`;
  wrap.innerHTML = html;
}

// ── Reconcile the dream design against the maker's inventory: have vs. source ──
function renderSourcing(filledSlots) {
  let wrap = document.getElementById('gap-suggestions');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'gap-suggestions';
    wrap.style.cssText = 'max-width:1100px;margin:1.5rem auto 0;padding:0 1.25rem';
    const out = document.getElementById('output-view');
    if (out) out.appendChild(wrap);
  }
  const inv = Array.isArray(ACTIVE_INVENTORY) ? ACTIVE_INVENTORY : [];
  // a curated floral is "covered" if the maker stocks something in the same role
  // that shares an emotion — otherwise it's on the sourcing list
  const covered = (s) => inv.some(i => i.role === s.role && (!s.ep ||
    [i.ep, i.es, i.blend].filter(Boolean).map(x => x.toLowerCase()).includes(String(s.ep).toLowerCase())));
  const items = filledSlots.filter(s => s && s.role);
  const have = items.filter(covered);
  const source = items.filter(s => !covered(s));
  const row = (s, mode) => `<div style="display:flex;align-items:center;gap:.6rem;padding:.45rem .6rem;border-radius:var(--rsm);background:var(--s2);border:1px solid var(--bd);margin-bottom:.35rem">
      <span style="width:14px;height:14px;border-radius:50%;background:${s.colorHex || '#c9b7a8'};border:1px solid #0002;flex-shrink:0"></span>
      <span style="flex:1;font-size:12px;font-weight:500;color:var(--tx)">${s.name || s.role}</span>
      <span style="font-size:9px;color:var(--fa)">${s.role} · ${s.stemCount || s.floralUnits || 1}</span>
      <span style="font-size:9px;font-weight:700;padding:1px 8px;border-radius:20px;${mode==='have'?'background:var(--gp);color:var(--green)':'background:#f3e6d4;color:#9a7b3a'}">${mode==='have'?'in stock':'to source'}</span>
    </div>`;
  let html = `<div style="border-top:1px solid var(--bd);padding-top:1.25rem">
    <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fa);margin-bottom:.25rem">Sourcing</div>
    <div style="font-family:var(--serif,'Cormorant Garamond',serif);font-size:1.35rem;margin-bottom:1rem;color:var(--tx)">What this design calls for</div>`;
  if (source.length) html += `<div style="font-size:10px;color:var(--mu);margin-bottom:.4rem">To source (${source.length})</div>` + source.map(s => row(s, 'source')).join('');
  if (have.length) html += `<div style="font-size:10px;color:var(--mu);margin:.7rem 0 .4rem">Your inventory can cover (${have.length})</div>` + have.map(s => row(s, 'have')).join('');
  html += `</div>`;
  wrap.innerHTML = html;
}

async function renderGapSuggestions(filledSlots, formula, emotions, poemEmotions) {
  let wrap = document.getElementById('gap-suggestions');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'gap-suggestions';
    wrap.style.cssText = 'max-width:1100px;margin:1.5rem auto 0;padding:0 1.25rem';
    const out = document.getElementById('output-view');
    if (out) out.appendChild(wrap);
  }
  wrap.innerHTML = '';
  const gaps = filledSlots.filter(s => !s.item);
  if (!gaps.length) return;
  try {
    const body = {
      formula, emotions, poemEmotions,
      filledSlots: filledSlots.map(s => ({
        role: s.role, tier: s.tier,
        item: s.item ? { id: s.item.id, movement: s.item.movement, finish: s.item.finish, ep: s.item.ep, es: s.item.es, palette: s.item.palette } : null,
      })),
    };
    const res = await fetch(`${CONFIG.apiBase}/api/gaps`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const json = await res.json();
    if (!json.success || !json.data || !(json.data.gaps || []).length) return;
    let html = `<div style="border-top:1px solid var(--bd);padding-top:1.25rem">
      <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fa);margin-bottom:.25rem">Complete your design</div>
      <div style="font-family:var(--serif,'Cormorant Garamond',serif);font-size:1.35rem;margin-bottom:1rem;color:var(--tx)">Pieces this design calls for that aren't in your inventory yet</div>`;
    json.data.gaps.forEach(g => {
      html += `<div style="margin-bottom:1.1rem">
        <div style="font-size:11px;color:var(--mu);margin-bottom:.5rem">For the <strong>${g.slot.role}</strong> in the ${g.slot.tier} layer</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.75rem">`;
      (g.suggestions || []).forEach(s => {
        const img = s.imageUrl
          ? `<div style="height:120px;background:#f3efe9"><img src="${s.imageUrl}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"></div>`
          : `<div style="height:120px;background:${s.colorHex || '#e4ddd3'}"></div>`;
        html += `<div style="border:1px solid var(--bd);border-radius:var(--rsm);overflow:hidden;background:var(--s2)">
          ${img}
          <div style="padding:.6rem .7rem">
            <div style="font-size:12px;font-weight:600;color:var(--tx);line-height:1.2;margin-bottom:.3rem">${s.name || ''}</div>
            <div style="font-size:10px;color:var(--mu);line-height:1.45;margin-bottom:.4rem">${s.reason || ''}</div>
            <div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--fa)"><span>${s.price ? '$' + s.price : ''}</span><span>${s.colorName || ''}</span></div>
          </div>
        </div>`;
      });
      html += `</div></div>`;
    });
    html += `</div>`;
    wrap.innerHTML = html;
  } catch (e) { /* silent — suggestions are optional */ }
}

function copyPrompt() {
  const t = document.getElementById('prompt-text')?.textContent;
  if (!t) return;
  navigator.clipboard.writeText(t).then(() => {
    const btn = document.querySelector('.copy-btn');
    if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1800); }
  });
}

function resetAll() {
  currentStep = 0;
  answers = {};
  selectedOption = null;
  document.getElementById('output-view').style.display = 'none';
  document.getElementById('generating-view').style.display = 'none';
  document.getElementById('intake-view').style.display = 'block';
  renderStep();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Start
renderStep();
loadUserInventory();
</script>
</body>
</html>
